<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Particle Life</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; user-select: none; }
    canvas { display: block; }

    #error {
      display: none;
      color: #f66;
      font-family: monospace;
      font-size: 14px;
      padding: 24px;
    }

    /* ── Shared panel glass style ────────────────────────────────────────── */
    .panel {
      position: fixed;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      color: rgba(255, 255, 255, 0.75);
      font-family: monospace;
      font-size: 12px;
    }

    /* ── Speed slider ────────────────────────────────────────────────────── */
    #ui {
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      border-radius: 999px;
      white-space: nowrap;
    }
    #speed-label { min-width: 52px; text-align: right; color: #fff; }
    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 160px; height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      cursor: pointer;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%; background: #fff; cursor: pointer;
    }
    #speed-slider::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%; background: #fff; border: none; cursor: pointer;
    }

    /* ── Matrix panel ────────────────────────────────────────────────────── */
    #matrix-panel { top: 20px; right: 20px; padding: 14px; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: rgba(255, 255, 255, 0.85);
    }

    /* Type counter: [−] 6 [+] */
    .type-counter {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #fff;
    }
    #types-count { min-width: 10px; text-align: center; }

    .icon-btn {
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.85);
      border-radius: 5px;
      width: 22px; height: 22px;
      font-size: 15px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
      font-family: monospace;
    }
    .icon-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.22); }
    .icon-btn:disabled { opacity: 0.28; cursor: default; }

    #randomize-btn {
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: rgba(255, 255, 255, 0.8);
      border-radius: 5px;
      padding: 3px 9px;
      font-family: monospace; font-size: 11px;
      cursor: pointer;
      transition: background 0.12s;
    }
    #randomize-btn:hover { background: rgba(255, 255, 255, 0.22); }

    /* Matrix grid */
    #matrix-grid { display: grid; gap: 3px; }

    .type-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
    }

    .matrix-cell {
      width: 30px; height: 30px;
      border-radius: 5px;
      cursor: ns-resize;
      touch-action: none;
      transition: filter 0.08s;
    }
    .matrix-cell:hover { filter: brightness(1.6); }

    .panel-legend {
      display: flex;
      justify-content: space-between;
      margin-top: 9px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }
    .legend-attract { color: #33cc55; }
    .legend-repel   { color: #cc3333; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="error"></div>

  <!-- Speed slider -->
  <div id="ui" class="panel">
    <span>Speed</span>
    <input type="range" id="speed-slider" min="0" max="4" step="0.05" value="1" />
    <span id="speed-label">1.00×</span>
  </div>

  <!-- Attraction matrix -->
  <div id="matrix-panel" class="panel">
    <div class="panel-header">
      <span>Attraction Matrix</span>
      <div class="type-counter">
        <button id="types-minus" class="icon-btn" title="Remove type">−</button>
        <span id="types-count">2</span>
        <button id="types-plus"  class="icon-btn" title="Add type">+</button>
      </div>
      <button id="randomize-btn">Randomize</button>
    </div>

    <div id="matrix-grid"></div>

    <div class="panel-legend">
      <span>click = 0 &nbsp; drag ↕ = adjust</span>
      <span>
        <span class="legend-attract">■</span> attract &nbsp;
        <span class="legend-repel">■</span> repel
      </span>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
